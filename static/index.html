<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTC/USDT Trading Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0e27;
            color: #e0e0e0;
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: #1a1f3a;
            border-radius: 12px;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        .status-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #4caf50;
            display: inline-block;
            animation: pulse 2s infinite;
        }
        
        .status-indicator.disconnected {
            background: #f44336;
            animation: none;
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(76,175,80,0.7); }
            70% { box-shadow: 0 0 0 10px rgba(76,175,80,0); }
            100% { box-shadow: 0 0 0 0 rgba(76,175,80,0); }
        }
        
        .price {
            font-size: 28px;
            font-weight: bold;
            color: #4caf50;
        }
        
        .price.down { color: #f44336; }
        
        .main-content {
            display: flex;
            gap: 15px;
            flex: 1;
            min-height: 0;
        }
        
        .chart-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .chart-container {
            flex: 1;
            background: #1a1f3a;
            border-radius: 12px;
            padding: 15px;
            border: 1px solid rgba(255,255,255,0.05);
            min-height: 400px;
        }
        
        canvas { width: 100% !important; height: 100% !important; }
        
        .controls {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 8px 16px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            background: rgba(15,20,50,0.8);
            color: #e0e0e0;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }
        
        .btn:hover {
            background: rgba(30,40,80,0.9);
            transform: translateY(-1px);
        }
        
        .btn.active {
            background: #f0a500;
            color: #0a0e27;
            border-color: #f0a500;
        }
        
        .side-panel {
            width: 300px;
            background: #1a1f3a;
            border-radius: 12px;
            padding: 15px;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
        }
        
        .stat-card {
            background: rgba(255,255,255,0.03);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        .stat-label {
            font-size: 10px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .stat-value {
            font-size: 18px;
            font-weight: bold;
            color: #f0a500;
            margin-top: 4px;
        }
        
        .history-controls {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .history-controls h3 {
            color: #888;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .date-input-group {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        
        .date-input {
            flex: 1;
            padding: 8px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px;
            color: #e0e0e0;
            font-size: 13px;
        }
        
        .data-info {
            font-size: 11px;
            color: #666;
            padding: 8px;
            background: rgba(255,255,255,0.02);
            border-radius: 6px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1 style="color:#f0a500; font-size:22px; margin:0;">
                    <span class="status-indicator" id="statusIndicator"></span>
                    BTC/USDT
                </h1>
                <small style="color:#888;">Данные обновляются каждые 5 сек</small>
            </div>
            <div style="text-align:right;">
                <div class="price" id="currentPrice">Загрузка...</div>
                <div id="priceChange" style="font-size:13px; margin-top:4px;"></div>
            </div>
        </div>
        
        <div class="main-content">
            <div class="chart-panel">
                <div class="chart-container">
                    <canvas id="tradingChart"></canvas>
                </div>
                <div class="controls">
                    <button class="btn" onclick="fitAllData()">📊 Показать всё</button>
                    <button class="btn" onclick="resetZoom()">🔄 Сбросить зум</button>
                    <button class="btn" onclick="setTimeRange(300)">5 мин</button>
                    <button class="btn" onclick="setTimeRange(900)">15 мин</button>
                    <button class="btn" onclick="setTimeRange(3600)">1 час</button>
                    <button class="btn" onclick="setTimeRange(14400)">4 часа</button>
                    <button class="btn" onclick="setTimeRange(86400)">24 часа</button>
                    <button class="btn" onclick="toggleVolumeUSD()">💰 Vol USD</button>
                    <button class="btn" onclick="toggleVolumeBTC()">₿ Vol BTC</button>
                </div>
            </div>
            
            <div class="side-panel">
                <div class="stat-card">
                    <div class="stat-label">💰 Текущая цена</div>
                    <div class="stat-value" id="statPrice">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">📈 Volume USD</div>
                    <div class="stat-value" id="statVolumeUSD">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">₿ Volume BTC</div>
                    <div class="stat-value" id="statVolumeBTC">-</div>
                </div>
                
                <div class="history-controls">
                    <h3>📅 Загрузка истории</h3>
                    <div class="date-input-group">
                        <span style="color:#888;font-size:12px;">С:</span>
                        <input type="datetime-local" id="dateStart" class="date-input">
                    </div>
                    <div class="date-input-group">
                        <span style="color:#888;font-size:12px;">По:</span>
                        <input type="datetime-local" id="dateEnd" class="date-input">
                    </div>
                    <button class="btn" onclick="loadHistoryRange()" style="width:100%;">📥 Загрузить диапазон</button>
                    <button class="btn" onclick="loadAllHistory()" style="width:100%;">📚 Загрузить ВСЮ историю</button>
                </div>
                
                <div class="data-info">
                    <div>Точек на графике: <b id="pointsCount">0</b></div>
                    <div>Период: <span id="dateRange">-</span></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://192.168.0.100:9090';
        const WS_URL = 'ws://192.168.0.100:9090/ws/observe';
        
        let chart = null;
        let ws = null;
        let previousPrice = null;
        let updateCount = 0;
        let allDataPoints = [];
        
        // Получить timestamp из любого формата даты
        function getTimestamp(dateValue) {
            if (!dateValue) return Date.now();
            if (dateValue instanceof Date) return dateValue.getTime();
            if (typeof dateValue === 'number') return dateValue;
            if (typeof dateValue === 'string') {
                let d = new Date(dateValue);
                if (!isNaN(d.getTime())) return d.getTime();
                d = new Date(dateValue.replace(' ', 'T'));
                if (!isNaN(d.getTime())) return d.getTime();
                d = new Date(dateValue.replace(' ', 'T') + 'Z');
                if (!isNaN(d.getTime())) return d.getTime();
            }
            return Date.now();
        }
        
        // Форматирование времени
        function formatTime(dateValue) {
            const ts = getTimestamp(dateValue);
            const d = new Date(ts);
            return d.toLocaleTimeString('ru-RU', {hour: '2-digit', minute: '2-digit', second: '2-digit'});
        }
        
        function formatDateTime(dateValue) {
            const ts = getTimestamp(dateValue);
            const d = new Date(ts);
            return d.toLocaleString('ru-RU');
        }
        
        // Нормализация данных
        function normalizeData(data) {
            return {
                created_at: data.created_at || new Date().toISOString(),
                price: Number(data.price) || 0,
                volume: Number(data.volume) || 0,
                volume_cur: Number(data.volume_cur) || 0,
                timestamp: getTimestamp(data.created_at)
            };
        }
        
        // Обновление всего графика из allDataPoints
        function refreshChart() {
            if (!chart) return;
            
            // СОРТИРУЕМ по времени (старые -> новые)
            allDataPoints.sort((a, b) => a.timestamp - b.timestamp);
            
            // Очищаем
            chart.data.labels = [];
            chart.data.datasets[0].data = [];
            chart.data.datasets[1].data = [];
            chart.data.datasets[2].data = [];
            
            // Заполняем
            for (const point of allDataPoints) {
                chart.data.labels.push(formatTime(point.created_at));
                chart.data.datasets[0].data.push(point.price);
                chart.data.datasets[1].data.push(point.volume);
                chart.data.datasets[2].data.push(point.volume_cur);
            }
            
            chart.update('none');
            
            // Статистика
            document.getElementById('pointsCount').textContent = allDataPoints.length;
            if (allDataPoints.length > 0) {
                const first = formatDateTime(allDataPoints[0].created_at);
                const last = formatDateTime(allDataPoints[allDataPoints.length - 1].created_at);
                document.getElementById('dateRange').textContent = `${first} — ${last}`;
            }
            
            // Последняя цена
            if (allDataPoints.length > 0) {
                updateCurrentPrice(allDataPoints[allDataPoints.length - 1]);
            }
        }
        
        // Инициализация графика
        function initChart() {
            const canvas = document.getElementById('tradingChart');
            if (!canvas) return;
            
            const ctx = canvas.getContext('2d');
            if (chart) chart.destroy();
            
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [
                        {
                            label: 'Цена BTC/USDT',
                            data: [],
                            borderColor: '#4caf50',
                            backgroundColor: 'rgba(76,175,80,0.05)',
                            borderWidth: 2,
                            yAxisID: 'y-price',
                            tension: 0.4,
                            pointRadius: 0,
                            fill: true
                        },
                        {
                            label: 'Volume USD',
                            data: [],
                            borderColor: '#2196f3',
                            backgroundColor: 'rgba(33,150,243,0.05)',
                            borderWidth: 1.5,
                            yAxisID: 'y-volume-usd',
                            tension: 0.4,
                            pointRadius: 0,
                            fill: true
                        },
                        {
                            label: 'Volume BTC',
                            data: [],
                            borderColor: '#f0a500',
                            backgroundColor: 'rgba(240,165,0,0.05)',
                            borderWidth: 1.5,
                            yAxisID: 'y-volume-btc',
                            tension: 0.4,
                            pointRadius: 0,
                            fill: true
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: false,
                    interaction: {
                        mode: 'index',
                        intersect: false
                    },
                    plugins: {
                        legend: {
                            labels: {
                                color: '#e0e0e0',
                                usePointStyle: true,
                                padding: 15
                            }
                        },
                        tooltip: {
                            mode: 'index',
                            intersect: false,
                            backgroundColor: 'rgba(15,20,50,0.95)',
                            titleColor: '#f0a500',
                            bodyColor: '#e0e0e0',
                            borderColor: 'rgba(240,165,0,0.3)',
                            borderWidth: 1,
                            callbacks: {
                                label: function(ctx) {
                                    let label = ctx.dataset.label + ': ';
                                    const val = Number(ctx.parsed.y) || 0;
                                    if (ctx.datasetIndex === 0) {
                                        label += '$' + val.toLocaleString('en-US', {minimumFractionDigits: 2});
                                    } else if (ctx.datasetIndex === 1) {
                                        label += '$' + val.toLocaleString('en-US');
                                    } else {
                                        label += val.toFixed(4) + ' BTC';
                                    }
                                    return label;
                                }
                            }
                        },
                        zoom: {
                            pan: { enabled: true, mode: 'x' },
                            zoom: {
                                wheel: { enabled: true, speed: 0.1 },
                                pinch: { enabled: true },
                                mode: 'x'
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: { color: '#666', maxTicksLimit: 20 }
                        },
                        'y-price': {
                            type: 'linear',
                            position: 'left',
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: {
                                color: '#4caf50',
                                callback: v => '$' + (Number(v)||0).toLocaleString('en-US')
                            }
                        },
                        'y-volume-usd': {
                            type: 'linear',
                            position: 'right',
                            grid: { drawOnChartArea: false },
                            ticks: {
                                color: '#2196f3',
                                callback: v => {
                                    const n = Number(v)||0;
                                    if (n >= 1e6) return '$' + (n/1e6).toFixed(1) + 'M';
                                    if (n >= 1e3) return '$' + (n/1e3).toFixed(1) + 'K';
                                    return '$' + n;
                                }
                            }
                        },
                        'y-volume-btc': {
                            type: 'linear',
                            position: 'right',
                            grid: { drawOnChartArea: false },
                            ticks: {
                                color: '#f0a500',
                                callback: v => (Number(v)||0).toFixed(2) + ' BTC'
                            }
                        }
                    }
                }
            });
        }
        
        // Загрузка последних данных
        async function loadInitialData() {
            try {
                const resp = await fetch(`${API_BASE_URL}/last-prices`);
                const data = await resp.json();
                if (data && data.length > 0) {
                    allDataPoints = data.map(d => normalizeData(d));
                    refreshChart();
                }
            } catch (e) {
                console.error('Ошибка загрузки начальных данных:', e);
            }
        }
        
        // Загрузка ВСЕЙ истории
        async function loadAllHistory() {
            try {
                document.getElementById('currentPrice').textContent = 'Загрузка...';
                const resp = await fetch(`${API_BASE_URL}/prices`);
                const data = await resp.json();
                if (data && data.length > 0) {
                    allDataPoints = data.map(d => normalizeData(d));
                    refreshChart();
                    fitAllData(); // Показать всё
                }
            } catch (e) {
                console.error('Ошибка загрузки всей истории:', e);
            }
        }
        
        // Загрузка диапазона
        async function loadHistoryRange() {
            const start = document.getElementById('dateStart').value;
            const end = document.getElementById('dateEnd').value;
            if (!start || !end) return alert('Выберите даты');
            
            try {
                const resp = await fetch(`${API_BASE_URL}/prices-window?start=${encodeURIComponent(new Date(start).toISOString())}&end=${encodeURIComponent(new Date(end).toISOString())}`);
                const data = await resp.json();
                if (data && data.length > 0) {
                    const newPoints = data.map(d => normalizeData(d));
                    // Объединяем, убираем дубликаты по timestamp
                    const existing = new Set(allDataPoints.map(p => p.timestamp));
                    for (const p of newPoints) {
                        if (!existing.has(p.timestamp)) {
                            allDataPoints.push(p);
                            existing.add(p.timestamp);
                        }
                    }
                    refreshChart();
                    fitAllData();
                }
            } catch (e) {
                console.error('Ошибка загрузки диапазона:', e);
            }
        }
        
        // Добавление точки из WebSocket
        function addRealtimePoint(data) {
            const point = normalizeData(data);
            allDataPoints.push(point);
            // Удаляем старые дубликаты если есть
            const seen = new Set();
            allDataPoints = allDataPoints.filter(p => {
                const key = p.timestamp;
                if (seen.has(key)) return false;
                seen.add(key);
                return true;
            });
            refreshChart();
            updateCount++;
        }
        
        // Обновление цены в шапке
        function updateCurrentPrice(data) {
            const p = Number(data.price) || 0;
            const v = Number(data.volume) || 0;
            const vc = Number(data.volume_cur) || 0;
            
            document.getElementById('currentPrice').textContent = '$' + p.toLocaleString('en-US', {minimumFractionDigits: 2});
            document.getElementById('statPrice').textContent = '$' + p.toLocaleString('en-US', {minimumFractionDigits: 2});
            document.getElementById('statVolumeUSD').textContent = '$' + v.toLocaleString('en-US');
            document.getElementById('statVolumeBTC').textContent = vc.toFixed(4) + ' BTC';
            
            if (previousPrice !== null && previousPrice !== p) {
                const change = p - previousPrice;
                const changePercent = ((change / previousPrice) * 100).toFixed(2);
                const el = document.getElementById('priceChange');
                const priceEl = document.getElementById('currentPrice');
                
                if (change > 0) {
                    priceEl.className = 'price';
                    el.innerHTML = `<span style="color:#4caf50;">▲ +$${change.toFixed(2)} (${changePercent}%)</span>`;
                } else if (change < 0) {
                    priceEl.className = 'price down';
                    el.innerHTML = `<span style="color:#f44336;">▼ -$${Math.abs(change).toFixed(2)} (${changePercent}%)</span>`;
                }
            }
            previousPrice = p;
        }
        
        // WebSocket
        function connectWebSocket() {
            if (ws && ws.readyState === WebSocket.OPEN) return;
            
            ws = new WebSocket(WS_URL);
            ws.onopen = () => {
                document.getElementById('statusIndicator').classList.remove('disconnected');
            };
            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (data && data.price !== undefined) {
                        addRealtimePoint(data);
                    }
                } catch (e) {}
            };
            ws.onclose = () => {
                document.getElementById('statusIndicator').classList.add('disconnected');
                setTimeout(connectWebSocket, 3000);
            };
            ws.onerror = () => {
                document.getElementById('statusIndicator').classList.add('disconnected');
            };
        }
        
        // Управление графиком
        function toggleVolumeUSD() {
            if (!chart) return;
            chart.data.datasets[1].hidden = !chart.data.datasets[1].hidden;
            chart.update('none');
        }
        
        function toggleVolumeBTC() {
            if (!chart) return;
            chart.data.datasets[2].hidden = !chart.data.datasets[2].hidden;
            chart.update('none');
        }
        
        function resetZoom() {
            if (!chart) return;
            chart.resetZoom();
        }
        
        function fitAllData() {
            if (!chart || allDataPoints.length < 2) return;
            chart.resetZoom();
            const first = allDataPoints[0].timestamp;
            const last = allDataPoints[allDataPoints.length - 1].timestamp;
            const padding = (last - first) * 0.02;
            chart.options.scales.x.min = first - padding;
            chart.options.scales.x.max = last + padding;
            chart.update('none');
        }
        
        function setTimeRange(seconds) {
            if (!chart || allDataPoints.length === 0) return;
            const last = allDataPoints[allDataPoints.length - 1].timestamp;
            chart.options.scales.x.min = last - seconds * 1000;
            chart.options.scales.x.max = last;
            chart.update('none');
        }
        
        // Старт
        async function start() {
            initChart();
            
            // Установка дат по умолчанию
            const now = new Date();
            const dayAgo = new Date(now.getTime() - 86400000);
            document.getElementById('dateEnd').value = now.toISOString().slice(0, 16);
            document.getElementById('dateStart').value = dayAgo.toISOString().slice(0, 16);
            
            await loadInitialData();
            connectWebSocket();
        }
        
        document.addEventListener('DOMContentLoaded', start);
        window.addEventListener('resize', () => { if (chart) chart.resize(); });
    </script>
</body>
</html>
