<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTC/USDT Trading Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #0a0e27;
            color: #e0e0e0;
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 20px;
            background: linear-gradient(135deg, #1a1f3a 0%, #0f1433 100%);
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .header h1 {
            font-size: 24px;
            color: #f0a500;
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 0;
        }
        
        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #4caf50;
            display: inline-block;
            animation: pulse 2s infinite;
            box-shadow: 0 0 10px rgba(76, 175, 80, 0.5);
        }
        
        .status-indicator.disconnected {
            background: #f44336;
            animation: none;
            box-shadow: 0 0 10px rgba(244, 67, 54, 0.5);
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(76, 175, 80, 0); }
            100% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0); }
        }
        
        .update-counter {
            font-size: 12px;
            color: #888;
            background: rgba(255, 255, 255, 0.05);
            padding: 5px 10px;
            border-radius: 20px;
        }
        
        .current-price {
            text-align: right;
        }
        
        .price-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .current-price .price {
            font-size: 32px;
            font-weight: bold;
            color: #4caf50;
            transition: color 0.3s ease;
        }
        
        .current-price .price.down {
            color: #f44336;
        }
        
        .price-arrow {
            font-size: 24px;
            transition: all 0.3s ease;
        }
        
        .price-arrow.up {
            color: #4caf50;
        }
        
        .price-arrow.down {
            color: #f44336;
        }
        
        .chart-container {
            background: linear-gradient(135deg, #1a1f3a 0%, #0f1433 100%);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
            height: 600px;
            margin-bottom: 20px;
        }
        
        canvas {
            width: 100% !important;
            height: 100% !important;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 10px 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            background: rgba(15, 20, 50, 0.8);
            color: #e0e0e0;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            font-weight: 500;
            backdrop-filter: blur(10px);
        }
        
        .btn:hover {
            background: rgba(30, 40, 80, 0.9);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        
        .btn.active {
            background: linear-gradient(135deg, #f0a500, #f57c00);
            color: #0a0e27;
            border-color: #f0a500;
            box-shadow: 0 0 20px rgba(240, 165, 0, 0.3);
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #1a1f3a 0%, #0f1433 100%);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5);
            border-color: rgba(240, 165, 0, 0.3);
        }
        
        .stat-label {
            font-size: 11px;
            color: #666;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: #f0a500;
            transition: all 0.3s ease;
        }
        
        .debug-panel {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 10px;
            margin-top: 20px;
            font-family: monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
            display: none;
        }
        
        .debug-panel.show {
            display: block;
        }
        
        .debug-entry {
            color: #4caf50;
            margin: 2px 0;
        }
        
        .debug-entry.error {
            color: #f44336;
        }
        
        .debug-entry.ws {
            color: #2196f3;
        }
        
        .debug-entry.warning {
            color: #f0a500;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-left">
                <div>
                    <h1>
                        <span class="status-indicator" id="statusIndicator"></span>
                        BTC/USDT
                    </h1>
                    <small style="color: #888;">Real-time WebSocket • Обновление каждые 5с</small>
                </div>
                <div class="update-counter" id="updateCounter">
                    Загрузка...
                </div>
            </div>
            <div class="current-price">
                <div class="price-container">
                    <span class="price-arrow" id="priceArrow">●</span>
                    <div class="price" id="currentPrice">Загрузка...</div>
                </div>
                <div class="change" id="priceChange" style="font-size: 14px; margin-top: 5px;"></div>
            </div>
        </div>
        
        <div class="chart-container">
            <canvas id="tradingChart"></canvas>
        </div>
        
        <div class="controls">
            <button class="btn active" onclick="resetZoom()">🔄 Сбросить зум</button>
            <button class="btn" onclick="setTimeRange(60)">📊 1 мин</button>
            <button class="btn" onclick="setTimeRange(300)">📊 5 мин</button>
            <button class="btn" onclick="setTimeRange(900)">📊 15 мин</button>
            <button class="btn" onclick="setTimeRange(3600)">📊 1 час</button>
            <button class="btn" onclick="toggleVolumeUSD()">💰 Volume USD</button>
            <button class="btn" onclick="toggleVolumeBTC()">₿ Volume BTC</button>
            <button class="btn" onclick="toggleDebug()">🐛 Debug</button>
        </div>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-label">💰 Последняя цена</div>
                <div class="stat-value" id="statPrice">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">📈 Volume USD</div>
                <div class="stat-value" id="statVolumeUSD">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">₿ Volume BTC</div>
                <div class="stat-value" id="statVolumeBTC">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">⏱️ Последнее обновление</div>
                <div class="stat-value" id="statLastUpdate">-</div>
            </div>
        </div>
        
        <div class="debug-panel" id="debugPanel"></div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:9090';
        const WS_URL = 'ws://localhost:9090/ws/observe';
        
        let chart = null;
        let ws = null;
        let reconnectAttempts = 0;
        let maxReconnectAttempts = 10;
        let previousPrice = null;
        let updateCount = 0;
        let debugEnabled = false;
        
        // Безопасное форматирование даты
        function formatDateTime(dateValue) {
            try {
                if (!dateValue) {
                    return new Date().toLocaleTimeString();
                }
                
                // Если это уже объект Date
                if (dateValue instanceof Date) {
                    return dateValue.toLocaleTimeString();
                }
                
                // Если это число (timestamp)
                if (typeof dateValue === 'number') {
                    const date = new Date(dateValue);
                    if (!isNaN(date.getTime())) {
                        return date.toLocaleTimeString();
                    }
                }
                
                // Если это строка
                if (typeof dateValue === 'string') {
                    // Пробуем разные форматы
                    let date = new Date(dateValue);
                    if (!isNaN(date.getTime())) {
                        return date.toLocaleTimeString();
                    }
                    
                    // Пробуем заменить пробел на T для ISO формата
                    date = new Date(dateValue.replace(' ', 'T'));
                    if (!isNaN(date.getTime())) {
                        return date.toLocaleTimeString();
                    }
                    
                    // Пробуем с миллисекундами
                    date = new Date(dateValue.replace(' ', 'T') + 'Z');
                    if (!isNaN(date.getTime())) {
                        return date.toLocaleTimeString();
                    }
                }
                
                // Если ничего не сработало, возвращаем текущее время
                debug('⚠️ Could not parse date: ' + dateValue, 'warning');
                return new Date().toLocaleTimeString();
                
            } catch (error) {
                debug('❌ Error formatting date: ' + error.message, 'error');
                return new Date().toLocaleTimeString();
            }
        }
        
        // Получение timestamp из даты для сортировки
        function getTimestamp(dateValue) {
            try {
                if (!dateValue) return Date.now();
                
                if (dateValue instanceof Date) {
                    return dateValue.getTime();
                }
                
                if (typeof dateValue === 'number') {
                    return dateValue;
                }
                
                if (typeof dateValue === 'string') {
                    let date = new Date(dateValue);
                    if (!isNaN(date.getTime())) {
                        return date.getTime();
                    }
                    
                    date = new Date(dateValue.replace(' ', 'T'));
                    if (!isNaN(date.getTime())) {
                        return date.getTime();
                    }
                    
                    date = new Date(dateValue.replace(' ', 'T') + 'Z');
                    if (!isNaN(date.getTime())) {
                        return date.getTime();
                    }
                }
                
                return Date.now();
            } catch (error) {
                return Date.now();
            }
        }
        
        // Безопасное форматирование даты для отображения в статистике
        function formatFullDateTime(dateValue) {
            try {
                if (!dateValue) {
                    return new Date().toLocaleString();
                }
                
                let date;
                
                if (dateValue instanceof Date) {
                    date = dateValue;
                } else if (typeof dateValue === 'number') {
                    date = new Date(dateValue);
                } else if (typeof dateValue === 'string') {
                    date = new Date(dateValue);
                    if (isNaN(date.getTime())) {
                        date = new Date(dateValue.replace(' ', 'T'));
                    }
                    if (isNaN(date.getTime())) {
                        date = new Date(dateValue.replace(' ', 'T') + 'Z');
                    }
                }
                
                if (date && !isNaN(date.getTime())) {
                    return date.toLocaleString();
                }
                
                return new Date().toLocaleString();
                
            } catch (error) {
                return new Date().toLocaleString();
            }
        }
        
        // Нормализация данных - приводит все числовые поля к числам
        function normalizeData(data) {
            return {
                created_at: data.created_at || new Date().toISOString(),
                price: parseFloat(data.price) || 0,
                volume: parseFloat(data.volume) || 0,
                volume_cur: parseFloat(data.volume_cur) || 0,
                timestamp: getTimestamp(data.created_at)
            };
        }
        
        // Функция для отладки
        function debug(message, type = 'info') {
            console.log(message);
            
            if (debugEnabled) {
                const panel = document.getElementById('debugPanel');
                if (panel) {
                    const entry = document.createElement('div');
                    entry.className = 'debug-entry';
                    if (type === 'error') entry.className += ' error';
                    if (type === 'ws') entry.className += ' ws';
                    if (type === 'warning') entry.className += ' warning';
                    entry.textContent = new Date().toLocaleTimeString() + ' - ' + message;
                    panel.appendChild(entry);
                    panel.scrollTop = panel.scrollHeight;
                    
                    // Ограничиваем количество записей
                    while (panel.children.length > 100) {
                        panel.removeChild(panel.firstChild);
                    }
                }
            }
        }
        
        function toggleDebug() {
            debugEnabled = !debugEnabled;
            const panel = document.getElementById('debugPanel');
            if (panel) {
                panel.className = debugEnabled ? 'debug-panel show' : 'debug-panel';
            }
            debug('Debug ' + (debugEnabled ? 'включен' : 'выключен'));
        }
        
        // Сортировка данных по времени
        function sortDataByTime(dataArray) {
            return dataArray.sort((a, b) => {
                const timeA = a.timestamp || getTimestamp(a.created_at);
                const timeB = b.timestamp || getTimestamp(b.created_at);
                return timeA - timeB;
            });
        }
        
        // Инициализация графика
        function initChart() {
            try {
                const canvas = document.getElementById('tradingChart');
                if (!canvas) {
                    debug('Canvas element not found', 'error');
                    return false;
                }
                
                const ctx = canvas.getContext('2d');
                if (!ctx) {
                    debug('Could not get 2d context', 'error');
                    return false;
                }
                
                // Уничтожаем старый график если есть
                if (chart) {
                    chart.destroy();
                    chart = null;
                }
                
                chart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: [],
                        datasets: [
                            {
                                label: 'Цена BTC/USDT',
                                data: [],
                                borderColor: '#4caf50',
                                backgroundColor: 'rgba(76, 175, 80, 0.05)',
                                borderWidth: 2,
                                yAxisID: 'y-price',
                                tension: 0.4,
                                pointRadius: 0,
                                pointHoverRadius: 5,
                                pointHoverBackgroundColor: '#4caf50',
                                pointHoverBorderColor: '#fff',
                                pointHoverBorderWidth: 2,
                                fill: true
                            },
                            {
                                label: 'Volume USD',
                                data: [],
                                borderColor: '#2196f3',
                                backgroundColor: 'rgba(33, 150, 243, 0.05)',
                                borderWidth: 1.5,
                                yAxisID: 'y-volume-usd',
                                tension: 0.4,
                                pointRadius: 0,
                                pointHoverRadius: 4,
                                pointHoverBackgroundColor: '#2196f3',
                                pointHoverBorderColor: '#fff',
                                pointHoverBorderWidth: 2,
                                fill: true
                            },
                            {
                                label: 'Volume BTC',
                                data: [],
                                borderColor: '#f0a500',
                                backgroundColor: 'rgba(240, 165, 0, 0.05)',
                                borderWidth: 1.5,
                                yAxisID: 'y-volume-btc',
                                tension: 0.4,
                                pointRadius: 0,
                                pointHoverRadius: 4,
                                pointHoverBackgroundColor: '#f0a500',
                                pointHoverBorderColor: '#fff',
                                pointHoverBorderWidth: 2,
                                fill: true
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        animation: {
                            duration: 300,
                            easing: 'linear'
                        },
                        interaction: {
                            mode: 'index',
                            intersect: false,
                        },
                        plugins: {
                            legend: {
                                display: true,
                                position: 'top',
                                labels: {
                                    color: '#e0e0e0',
                                    usePointStyle: true,
                                    pointStyle: 'circle',
                                    padding: 20,
                                    font: {
                                        size: 12
                                    }
                                }
                            },
                            tooltip: {
                                mode: 'index',
                                intersect: false,
                                backgroundColor: 'rgba(15, 20, 50, 0.95)',
                                titleColor: '#f0a500',
                                bodyColor: '#e0e0e0',
                                borderColor: 'rgba(240, 165, 0, 0.3)',
                                borderWidth: 1,
                                padding: 12,
                                callbacks: {
                                    label: function(context) {
                                        let label = context.dataset.label || '';
                                        if (label) {
                                            label += ': ';
                                        }
                                        if (context.datasetIndex === 0) {
                                            const value = parseFloat(context.parsed.y) || 0;
                                            label += '$' + value.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
                                        } else if (context.datasetIndex === 1) {
                                            const value = parseFloat(context.parsed.y) || 0;
                                            label += '$' + value.toLocaleString('en-US', {minimumFractionDigits: 0, maximumFractionDigits: 0});
                                        } else if (context.datasetIndex === 2) {
                                            const value = parseFloat(context.parsed.y) || 0;
                                            label += value.toFixed(4) + ' BTC';
                                        }
                                        return label;
                                    }
                                }
                            },
                            zoom: {
                                pan: {
                                    enabled: true,
                                    mode: 'x',
                                },
                                zoom: {
                                    wheel: {
                                        enabled: true,
                                        speed: 0.1
                                    },
                                    pinch: {
                                        enabled: true
                                    },
                                    mode: 'x',
                                }
                            }
                        },
                        scales: {
                            x: {
                                display: true,
                                grid: {
                                    color: 'rgba(255, 255, 255, 0.05)',
                                },
                                ticks: {
                                    color: '#666',
                                    maxTicksLimit: 15,
                                    autoSkip: true,
                                    font: {
                                        size: 11
                                    }
                                }
                            },
                            'y-price': {
                                type: 'linear',
                                display: true,
                                position: 'left',
                                grid: {
                                    color: 'rgba(255, 255, 255, 0.05)',
                                },
                                ticks: {
                                    color: '#4caf50',
                                    callback: function(value) {
                                        const numValue = parseFloat(value) || 0;
                                        return '$' + numValue.toLocaleString('en-US', {minimumFractionDigits: 0, maximumFractionDigits: 0});
                                    },
                                    font: {
                                        size: 11
                                    }
                                },
                                title: {
                                    display: true,
                                    text: 'Цена (USDT)',
                                    color: '#4caf50',
                                    font: {
                                        size: 12,
                                        weight: 'bold'
                                    }
                                }
                            },
                            'y-volume-usd': {
                                type: 'linear',
                                display: true,
                                position: 'right',
                                grid: {
                                    drawOnChartArea: false,
                                },
                                ticks: {
                                    color: '#2196f3',
                                    callback: function(value) {
                                        const numValue = parseFloat(value) || 0;
                                        if (numValue >= 1000000) {
                                            return '$' + (numValue / 1000000).toFixed(1) + 'M';
                                        } else if (numValue >= 1000) {
                                            return '$' + (numValue / 1000).toFixed(1) + 'K';
                                        }
                                        return '$' + numValue;
                                    },
                                    font: {
                                        size: 11
                                    }
                                },
                                title: {
                                    display: true,
                                    text: 'Volume USD',
                                    color: '#2196f3',
                                    font: {
                                        size: 12,
                                        weight: 'bold'
                                    }
                                }
                            },
                            'y-volume-btc': {
                                type: 'linear',
                                display: true,
                                position: 'right',
                                grid: {
                                    drawOnChartArea: false,
                                },
                                ticks: {
                                    color: '#f0a500',
                                    callback: function(value) {
                                        const numValue = parseFloat(value) || 0;
                                        return numValue.toFixed(2) + ' BTC';
                                    },
                                    font: {
                                        size: 11
                                    }
                                },
                                title: {
                                    display: true,
                                    text: 'Volume BTC',
                                    color: '#f0a500',
                                    font: {
                                        size: 12,
                                        weight: 'bold'
                                    }
                                }
                            }
                        }
                    }
                });
                
                debug('✅ Chart initialized successfully');
                return true;
            } catch (error) {
                debug('❌ Error initializing chart: ' + error.message, 'error');
                return false;
            }
        }
        
        // Загрузка исторических данных
        async function loadHistoricalData() {
            try {
                debug('📥 Loading historical data from API...');
                const response = await fetch(`${API_BASE_URL}/last-prices`);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const rawData = await response.json();
                debug(`📊 Received ${rawData.length} historical data points`);
                
                if (rawData && rawData.length > 0) {
                    // Нормализуем данные
                    let data = rawData.map(item => normalizeData(item));
                    
                    // СОРТИРУЕМ ДАННЫЕ ПО ВРЕМЕНИ ОТ СТАРЫХ К НОВЫМ
                    data = sortDataByTime(data);
                    
                    debug(`📊 After sorting: first date=${formatDateTime(data[0].created_at)}, last date=${formatDateTime(data[data.length-1].created_at)}`);
                    
                    // Очищаем существующие данные
                    chart.data.labels = [];
                    chart.data.datasets.forEach(dataset => dataset.data = []);
                    
                    // Добавляем данные в правильном порядке
                    data.forEach((item, index) => {
                        addDataPoint(item, false);
                    });
                    
                    // Обновляем график
                    chart.update('none');
                    debug('✅ Historical data loaded and chart updated (sorted by time)');
                    
                    // Обновляем текущую цену (последняя точка - самая новая)
                    const lastItem = data[data.length - 1];
                    updateCurrentPrice(lastItem);
                    
                    document.getElementById('updateCounter').textContent = `Загружено: ${data.length} точек`;
                } else {
                    debug('⚠️ No data received from API', 'error');
                    document.getElementById('updateCounter').textContent = 'Нет данных';
                }
            } catch (error) {
                debug('❌ Error loading historical data: ' + error.message, 'error');
                document.getElementById('updateCounter').textContent = 'Ошибка загрузки';
            }
        }
        
        // Добавление точки данных
        function addDataPoint(data, update = true) {
            if (!chart) {
                debug('Chart not ready for adding data', 'error');
                return;
            }
            
            try {
                // Нормализуем данные
                const normalizedData = normalizeData(data);
                
                // Форматируем время
                const timestamp = formatDateTime(normalizedData.created_at);
                
                chart.data.labels.push(timestamp);
                chart.data.datasets[0].data.push(normalizedData.price);
                chart.data.datasets[1].data.push(normalizedData.volume);
                chart.data.datasets[2].data.push(normalizedData.volume_cur);
                
                // Ограничиваем количество точек
                const maxPoints = 500;
                while (chart.data.labels.length > maxPoints) {
                    chart.data.labels.shift();
                    chart.data.datasets.forEach(dataset => dataset.data.shift());
                }
                
                if (update) {
                    chart.update('none');
                    updateCurrentPrice(normalizedData);
                    updateCount++;
                    document.getElementById('updateCounter').textContent = `Обновлений: ${updateCount}`;
                    
                    if (debugEnabled) {
                        debug(`📈 #${updateCount}: ${timestamp} | $${normalizedData.price.toFixed(2)} | Vol: $${normalizedData.volume.toFixed(0)} | BTC: ${normalizedData.volume_cur.toFixed(4)}`);
                    }
                }
            } catch (error) {
                debug('Error adding data point: ' + error.message, 'error');
                console.error('Error details:', error, 'Data:', data);
            }
        }
        
        // Обновление текущей цены
        function updateCurrentPrice(data) {
            const priceElement = document.getElementById('currentPrice');
            const changeElement = document.getElementById('priceChange');
            const arrowElement = document.getElementById('priceArrow');
            
            if (!priceElement || !data) return;
            
            // Нормализуем данные
            const normalizedData = normalizeData(data);
            
            const price = normalizedData.price;
            const volume = normalizedData.volume;
            const volumeCur = normalizedData.volume_cur;
            
            const formattedPrice = '$' + price.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
            priceElement.textContent = formattedPrice;
            
            // Обновляем статистику с безопасным форматированием даты
            document.getElementById('statPrice').textContent = formattedPrice;
            document.getElementById('statVolumeUSD').textContent = '$' + volume.toLocaleString('en-US');
            document.getElementById('statVolumeBTC').textContent = volumeCur.toFixed(4) + ' BTC';
            document.getElementById('statLastUpdate').textContent = formatFullDateTime(normalizedData.created_at);
            
            if (previousPrice !== null && previousPrice !== price) {
                const change = price - previousPrice;
                const changePercent = ((change / previousPrice) * 100).toFixed(2);
                
                if (change > 0) {
                    priceElement.className = 'price';
                    arrowElement.className = 'price-arrow up';
                    arrowElement.textContent = '▲';
                    changeElement.innerHTML = `<span style="color: #4caf50;">+$${change.toFixed(2)} (${changePercent}%)</span>`;
                } else if (change < 0) {
                    priceElement.className = 'price down';
                    arrowElement.className = 'price-arrow down';
                    arrowElement.textContent = '▼';
                    changeElement.innerHTML = `<span style="color: #f44336;">-$${Math.abs(change).toFixed(2)} (${changePercent}%)</span>`;
                } else {
                    arrowElement.className = 'price-arrow';
                    arrowElement.textContent = '●';
                    changeElement.innerHTML = '<span style="color: #888;">0.00 (0.00%)</span>';
                }
            }
            
            previousPrice = price;
        }
        
        // Подключение WebSocket
        function connectWebSocket() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                debug('WebSocket already connected', 'ws');
                return;
            }
            
            try {
                debug('🔌 Connecting to WebSocket: ' + WS_URL, 'ws');
                ws = new WebSocket(WS_URL);
                
                ws.onopen = function() {
                    debug('✅ WebSocket connected successfully', 'ws');
                    document.getElementById('statusIndicator').classList.remove('disconnected');
                    reconnectAttempts = 0;
                };
                
                ws.onmessage = function(event) {
                    try {
                        debug('📨 WebSocket message received', 'ws');
                        const rawData = JSON.parse(event.data);
                        
                        if (debugEnabled) {
                            debug('📊 Data: ' + JSON.stringify(rawData), 'ws');
                        }
                        
                        if (rawData && rawData.price !== undefined) {
                            addDataPoint(rawData);
                        } else {
                            debug('⚠️ Received data without price field: ' + JSON.stringify(rawData), 'warning');
                        }
                    } catch (error) {
                        debug('❌ Error parsing WebSocket message: ' + error.message, 'error');
                        debug('Raw data: ' + event.data, 'error');
                    }
                };
                
                ws.onclose = function(event) {
                    debug(`❌ WebSocket disconnected: code=${event.code}, reason=${event.reason}`, 'ws');
                    document.getElementById('statusIndicator').classList.add('disconnected');
                    
                    if (!event.wasClean) {
                        attemptReconnect();
                    }
                };
                
                ws.onerror = function(error) {
                    debug('⚠️ WebSocket error occurred', 'error');
                    document.getElementById('statusIndicator').classList.add('disconnected');
                };
            } catch (error) {
                debug('❌ Error creating WebSocket: ' + error.message, 'error');
            }
        }
        
        // Попытка переподключения
        function attemptReconnect() {
            if (reconnectAttempts < maxReconnectAttempts) {
                reconnectAttempts++;
                const delay = Math.min(1000 * Math.pow(2, reconnectAttempts), 30000);
                debug(`🔄 Reconnect attempt ${reconnectAttempts}/${maxReconnectAttempts} in ${delay/1000}s...`, 'ws');
                
                setTimeout(() => {
                    connectWebSocket();
                }, delay);
            } else {
                debug('❌ Max reconnect attempts reached', 'error');
            }
        }
        
        // Управление отображением графиков
        function toggleVolumeUSD() {
            if (!chart) return;
            const dataset = chart.data.datasets[1];
            dataset.hidden = !dataset.hidden;
            chart.update('none');
        }
        
        function toggleVolumeBTC() {
            if (!chart) return;
            const dataset = chart.data.datasets[2];
            dataset.hidden = !dataset.hidden;
            chart.update('none');
        }
        
        // Сброс зума
        function resetZoom() {
            if (!chart) return;
            chart.resetZoom();
        }
        
        // Установка временного диапазона
        function setTimeRange(seconds) {
            if (!chart) return;
            
            const now = Date.now();
            chart.options.scales.x.min = now - seconds * 1000;
            chart.options.scales.x.max = now;
            chart.update('none');
        }
        
        // Инициализация приложения
        async function initApp() {
            debug('🚀 Starting application initialization...');
            
            // Инициализируем график
            if (!initChart()) {
                debug('Failed to initialize chart', 'error');
                return;
            }
            
            // Загружаем исторические данные
            await loadHistoricalData();
            
            // Подключаем WebSocket
            connectWebSocket();
            
            debug('✅ Application initialized successfully');
        }
        
        // Запуск при загрузке страницы
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initApp);
        } else {
            initApp();
        }
        
        // Обработка изменения размера окна
        window.addEventListener('resize', () => {
            if (chart) {
                chart.resize();
            }
        });
    </script>
</body>
</html>
